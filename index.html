<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Prophet - Admin Dashboard Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #a3cf62;
            --text: #ffffff;
            --danger: #ff4d4d;
            --admin-color: #ff9f43;
        }

        body.bullish { --bg-color: #0a1a0f; --accent: #00ff88; }
        body.bearish { --bg-color: #1a0a0a; --accent: #ff4d4d; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); transition: 0.8s; min-height: 100vh; }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .hidden { display: none !important; }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: none; }

        .main-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 1.5rem; }
        .panel { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        .btn-action {
            width: 100%; padding: 12px; border-radius: 12px; border: none; margin-top: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-harvest { background: var(--accent); color: #000; font-size: 1.2rem; height: 70px; }

        .wallet-card { background: linear-gradient(45deg, #111, #222); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); margin-bottom: 15px; }

        /* Admin Styles */
        .admin-panel { border-color: var(--admin-color) !important; background: rgba(255, 159, 67, 0.05); }
        .admin-badge { background: var(--admin-color); color: #000; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; float: right; }
        .req-card { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; border: 1px solid #333; }
        .req-btn { padding: 4px 8px; cursor: pointer; background: var(--accent); border: none; border-radius: 4px; font-weight: bold; margin-top: 5px; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid var(--accent);
            z-index: 2000; width: 90%; max-width: 400px;
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1999; }
        
        .log-box { font-size: 0.8rem; height: 130px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .price-ticker { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="text-align: center; background: #1a1a1a; padding: 3rem; border-radius: 30px; border: 2px solid var(--accent); width: 350px;">
            <div style="font-size: 4rem;">🐦</div>
            <h1 style="color: var(--accent)">KIWI PROPHET</h1>
            <input type="text" id="addr" placeholder="Polygon Address" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; background:#000; color:#fff;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; background:#000; color:#fff;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; font-weight:bold; cursor:pointer;">START GAME</button>
        </div>
    </div>

    <div id="deposit-modal" class="hidden">
        <div class="overlay" onclick="closeModal()"></div>
        <div class="modal">
            <h3>ฝาก K-TOKEN</h3>
            <p style="font-size: 0.8rem; color: #888; margin: 10px 0;">โอนไปที่: <code id="target-addr" style="color:var(--accent)">0x242cb010f78cc714cbe8f3e344f24d87486eb268</code></p>
            <input type="number" id="dep-amount" placeholder="จำนวน K" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <input type="text" id="dep-tx" placeholder="Transaction Hash" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn-action" style="background:var(--accent); color:#000;" onclick="submitDeposit()">แจ้งยืนยัน</button>
        </div>
    </div>

    <div class="container" id="game-ui">
        <div class="price-ticker">K-TOKEN: <span id="price-val">$0.000000</span> (<span id="price-chg">0%</span>)</div>

        <div class="main-layout">
            <div class="panel">
                <div class="wallet-card">
                    <p style="font-size: 0.7rem; color: #888;">BALANCE</p>
                    <h2 id="k-balance" style="color: var(--accent);">0.00 K</h2>
                    <div style="display: flex; gap: 5px; margin-top: 10px;">
                        <button onclick="openDeposit()" style="flex:1; cursor:pointer;">DEPOSIT</button>
                        <button onclick="withdraw()" style="flex:1; cursor:pointer;">WITHDRAW</button>
                    </div>
                </div>
                <h3>GUARDIAN <span id="admin-tag" class="admin-badge hidden">ADMIN</span></h3>
                <div style="text-align: center;">
                    <div class="bird-emoji" style="font-size: 5rem;">🐦</div>
                    <h2 id="bird-lvl">LVL: 1</h2>
                </div>
                <div class="hp-bar-bg" style="background:#333; height:10px; border-radius:5px; overflow:hidden; margin:10px 0;">
                    <div id="hp-fill" style="background:var(--accent); height:100%; width:100%;"></div>
                </div>
                <p id="hp-text" style="font-size: 0.8rem; text-align:center;">HP: 100/100</p>
                <button class="btn-action btn-upgrade" onclick="upgrade()">UPGRADE (50 Energy)</button>
                <button class="btn-action btn-claim hidden" id="claim-btn" style="background:#ff00ff; color:#fff" onclick="claimDaily()">🎁 CLAIM DAILY</button>
            </div>

            <div class="panel" style="text-align: center;">
                <h1 style="color: var(--accent); font-size: 4rem;" id="energy-val">0.00</h1>
                <p style="color: #666; font-weight: bold; margin-bottom: 2rem;">K-ENERGY</p>
                <button class="btn-action btn-harvest" onclick="harvest()">HARVEST</button>
                <button class="btn-action btn-heal" style="background:#4d94ff; color:#fff" onclick="heal()">HEAL (10 Energy)</button>
                <div style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 1.5rem;">
                    <h3>K-SHOP</h3>
                    <button class="btn-action" style="background:#fff; color:#000" onclick="buySuperShield()">SUPER SHIELD (10 K)</button>
                </div>
            </div>

            <div class="panel">
                <div id="admin-section" class="hidden">
                    <h3 style="color: var(--admin-color)">ADMIN CONTROL</h3>
                    <div class="log-box" id="admin-requests" style="height: 250px; background: rgba(0,0,0,0.5);">
                        <p style="color:#555; text-align:center;">No pending requests</p>
                    </div>
                </div>
                <div id="user-section">
                    <h3>WORLD LOG</h3>
                    <div class="log-box" id="game-log"></div>
                    <h3 style="margin-top: 1rem;">MY HISTORY</h3>
                    <div class="log-box" id="user-history" style="height: 150px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_ADDR = "0x242cb010f78cc714cbe8f3e344f24d87486eb268";
        const K_TOKEN_ADDR = "0x465C4eACE8eF06A4308db2e6CcE5D6f99BbB21dc";
        
        let player = { addr: "", pass: "", energy: 0, hp: 100, lvl: 1, pwr: 10, def: 5, kBalance: 0, lastClaim: 0, history: [] };
        let market = { state: "neutral" };
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function login() {
            const addrInput = document.getElementById('addr').value.trim().toLowerCase();
            const passInput = document.getElementById('pass').value.trim();
            if(addrInput.length < 10) return alert("Invalid Address");

            const saved = localStorage.getItem('kiwi_p3_db_' + addrInput);
            if(saved) {
                const data = JSON.parse(saved);
                if(data.pass !== passInput) return alert("Wrong Password");
                player = data;
            } else {
                player.addr = addrInput;
                player.pass = passInput;
                save();
            }

            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('game-ui').style.display = 'block';
            
            if(player.addr === ADMIN_ADDR) {
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('admin-tag').classList.remove('hidden');
            }

            updateUI();
            startPriceOracle();
            setInterval(gameTick, 5000); // Check every 5 sec for UI Sync
            renderAdminPanel();
        }

        function startPriceOracle() {
            const fetchPrice = async () => {
                try {
                    const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${K_TOKEN_ADDR}`);
                    const data = await res.json();
                    const pair = data.pairs[0];
                    const change = parseFloat(pair.priceChange.h24);
                    document.getElementById('price-val').innerText = `$${parseFloat(pair.priceUsd).toFixed(6)}`;
                    market.state = change > 2 ? "bullish" : (change < -2 ? "bearish" : "neutral");
                    document.body.className = market.state;
                } catch(e) {}
            };
            fetchPrice(); setInterval(fetchPrice, 15000);
        }

        function gameTick() {
            // Re-sync player data from storage in case Admin updated it
            const freshData = localStorage.getItem('kiwi_p3_db_' + player.addr);
            if(freshData) {
                const parsed = JSON.parse(freshData);
                player.kBalance = parsed.kBalance;
                player.history = parsed.history;
            }
            
            if(market.state === "bearish") {
                player.hp -= 1;
                if(player.hp <= 0) { player.hp = 50; if(player.lvl > 1) player.lvl--; }
            }
            checkDaily();
            updateUI();
            save();
            if(player.addr === ADMIN_ADDR) renderAdminPanel();
        }

        function openDeposit() { document.getElementById('deposit-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('deposit-modal').classList.add('hidden'); }

        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const tx = document.getElementById('dep-tx').value;
            if(!amt || !tx) return alert("กรุณากรอกข้อมูล");

            const req = { id: Date.now(), addr: player.addr, type: 'DEPOSIT', amount: parseFloat(amt), tx: tx, status: 'PENDING', date: new Date().toLocaleDateString() };
            
            player.history.unshift(req);
            
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            queue.push(req);
            localStorage.setItem('admin_queue', JSON.stringify(queue));

            addLog("แจ้งฝากเรียบร้อย รอยืนยัน...");
            closeModal();
            save();
            updateUI();
        }

        function withdraw() {
            const amt = prompt("จำนวน K ที่จะถอน (จะหักยอดทันที):");
            const val = parseFloat(amt);
            if(val && val > 0 && val <= player.kBalance) {
                player.kBalance -= val;
                const req = { id: Date.now(), addr: player.addr, type: 'WITHDRAW', amount: val, status: 'PENDING', date: new Date().toLocaleDateString() };
                player.history.unshift(req);
                
                let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
                queue.push(req);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                
                addLog(`สั่งถอน ${val} K เรียบร้อย`);
                save();
                updateUI();
            } else {
                alert("ยอดคงเหลือไม่พอ");
            }
        }

        // --- ADMIN LOGIC FIXED ---
        function renderAdminPanel() {
            if(player.addr !== ADMIN_ADDR) return;
            const adminBox = document.getElementById('admin-requests');
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            
            if(queue.length === 0) {
                adminBox.innerHTML = '<p style="color:#555; text-align:center;">No pending requests</p>';
                return;
            }

            adminBox.innerHTML = queue.map(req => `
                <div class="req-card">
                    <b style="color:var(--admin-color)">${req.type}</b> from ${req.addr.substring(0,8)}...<br>
                    Amount: <b>${req.amount} K</b><br>
                    ${req.type === 'DEPOSIT' ? 
                        `<button class="req-btn" onclick="approveDeposit(${req.id}, '${req.addr}')">APPROVE DEPOSIT</button>` :
                        `<button class="req-btn" style="background:#4d94ff" onclick="approveWithdraw(${req.id}, '${req.addr}')">CONFIRM & SEND TX</button>`
                    }
                    <button class="req-btn" style="background:var(--danger)" onclick="rejectReq(${req.id}, '${req.addr}')">REJECT</button>
                </div>
            `).join('');
        }

        function approveDeposit(reqId, userAddr) {
            // 1. Update Global Queue
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            if(reqIdx === -1) return;
            const req = queue[reqIdx];

            // 2. Update Target User File
            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            
            if(userData) {
                userData.kBalance += req.amount;
                // Update history item in user file
                userData.history.forEach(h => {
                    if(h.id === reqId) h.status = 'SUCCESS';
                });
                localStorage.setItem(userKey, JSON.stringify(userData));
                
                // 3. Remove from Admin Queue
                queue.splice(reqIdx, 1);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                
                alert(`ยืนยันการฝากให้ ${userAddr.substring(0,6)} สำเร็จ!`);
                renderAdminPanel();
            } else {
                alert("ไม่พบข้อมูลผู้เล่น!");
            }
        }

        function approveWithdraw(reqId, userAddr) {
            const tx = prompt("ใส่ Transaction Hash ที่โอนเงินจริงแล้ว:");
            if(!tx) return;

            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            if(reqIdx === -1) return;

            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            
            if(userData) {
                userData.history.forEach(h => {
                    if(h.id === reqId) {
                        h.status = 'SUCCESS';
                        h.tx = tx;
                    }
                });
                localStorage.setItem(userKey, JSON.stringify(userData));
                
                queue.splice(reqIdx, 1);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                
                alert("ยืนยันการถอนสำเร็จ!");
                renderAdminPanel();
            }
        }

        function rejectReq(reqId, userAddr) {
            if(!confirm("ต้องการปฏิเสธรายการนี้?")) return;
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            const req = queue[reqIdx];

            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            if(userData) {
                // If it was a withdraw, refund the K balance
                if(req.type === 'WITHDRAW') userData.kBalance += req.amount;
                
                userData.history.forEach(h => {
                    if(h.id === reqId) h.status = 'REJECTED';
                });
                localStorage.setItem(userKey, JSON.stringify(userData));
            }
            queue.splice(reqIdx, 1);
            localStorage.setItem('admin_queue', JSON.stringify(queue));
            renderAdminPanel();
        }

        // --- Standard Logic ---
        function harvest() {
            let gain = market.state === "bullish" ? 2 : 1;
            player.energy += gain;
            playSound(440, 0.1);
            updateUI();
        }

        function upgrade() {
            let cost = 50 * player.lvl;
            if(player.energy >= cost) {
                player.energy -= cost; player.lvl++;
                addLog("เลเวลอัพ!");
                updateUI(); save();
            }
        }

        function buySuperShield() {
            if(player.kBalance >= 10) {
                player.kBalance -= 10; player.def += 10; player.hp = 100;
                addLog("Super Shield Activated!");
                updateUI(); save();
            }
        }

        function checkDaily() {
            const btn = document.getElementById('claim-btn');
            if(Date.now() - player.lastClaim > 86400000 && player.lvl >= 5) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function claimDaily() {
            let r = player.lvl >= 10 ? 100 : 50;
            player.kBalance += r; player.lastClaim = Date.now();
            updateUI(); save();
        }

        function addLog(m) {
            const box = document.getElementById('game-log');
            box.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${m}</div>` + box.innerHTML;
        }

        function updateUI() {
            document.getElementById('energy-val').innerText = player.energy.toFixed(2);
            document.getElementById('k-balance').innerText = player.kBalance.toFixed(2) + " K";
            document.getElementById('bird-lvl').innerText = "LVL: " + player.lvl;
            document.getElementById('hp-fill').style.width = player.hp + "%";
            document.getElementById('hp-text').innerText = `HP: ${Math.floor(player.hp)}/100`;
            
            const histBox = document.getElementById('user-history');
            histBox.innerHTML = player.history.map(h => `
                <div style="border-bottom:1px solid #222; padding:5px; font-size:0.7rem;">
                    <b>${h.type}</b>: ${h.amount} K <br>
                    Status: <span style="color:${h.status === 'SUCCESS' ? 'var(--accent)' : (h.status === 'REJECTED' ? 'var(--danger)' : '#ff9f43')}">${h.status}</span>
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('kiwi_p3_db_' + player.addr, JSON.stringify(player)); }
    </script>
</body>
</html>
