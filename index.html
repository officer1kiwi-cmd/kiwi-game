<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiwi Prophet - Admin Pro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #a3cf62;
            --text: #ffffff;
            --danger: #ff4d4d;
            --admin-color: #ff9f43;
        }

        body.bullish { --bg-color: #0a1a0f; --accent: #00ff88; }
        body.bearish { --bg-color: #1a0a0a; --accent: #ff4d4d; }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); transition: 0.8s; min-height: 100vh; }

        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .hidden { display: none !important; }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: none; }

        .main-layout { display: grid; grid-template-columns: 320px 1fr 320px; gap: 1.5rem; }
        .panel { background: var(--card-bg); border-radius: 20px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        
        /* Bird Animation */
        .bird-display { position: relative; padding: 20px 0; }
        .bird-emoji { 
            font-size: 5rem; 
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--accent));
            animation: floatBird 3s infinite ease-in-out; 
        }
        @keyframes floatBird {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .btn-action {
            width: 100%; padding: 12px; border-radius: 12px; border: none; margin-top: 10px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-harvest { background: var(--accent); color: #000; font-size: 1.2rem; height: 70px; box-shadow: 0 4px 15px rgba(163, 207, 98, 0.3); }

        .wallet-card { background: linear-gradient(45deg, #111, #222); padding: 15px; border-radius: 15px; border: 1px solid var(--accent); margin-bottom: 15px; }

        /* Admin UI */
        .req-card { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 12px; font-size: 0.8rem; border-left: 4px solid var(--admin-color); }
        .address-box { 
            background: #111; padding: 5px; border-radius: 5px; font-family: monospace; 
            font-size: 0.7rem; color: #aaa; word-break: break-all; margin: 5px 0; border: 1px solid #222;
        }
        .copy-btn { background: #333; color: #fff; border: none; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 0.6rem; margin-left: 5px; }
        .req-btn { padding: 6px 10px; cursor: pointer; background: var(--accent); border: none; border-radius: 6px; font-weight: bold; margin-top: 8px; }

        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1a1a1a; padding: 25px; border-radius: 20px; border: 2px solid var(--accent);
            z-index: 2000; width: 90%; max-width: 400px;
        }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1999; }
        
        .log-box { font-size: 0.8rem; height: 130px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-top: 10px; }
        .price-ticker { font-size: 1.5rem; font-weight: bold; margin-bottom: 1rem; text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div style="text-align: center; background: #1a1a1a; padding: 3rem; border-radius: 30px; border: 2px solid var(--accent); width: 350px;">
            <div style="font-size: 4rem;">🐦</div>
            <h1 style="color: var(--accent)">KIWI PROPHET</h1>
            <input type="text" id="addr" placeholder="Polygon Address" style="width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; background:#000; color:#fff;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:none; background:#000; color:#fff;">
            <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); border:none; border-radius:10px; font-weight:bold; cursor:pointer; color:#000;">ENTER GAME</button>
        </div>
    </div>

    <div id="deposit-modal" class="hidden">
        <div class="overlay" onclick="closeModal()"></div>
        <div class="modal">
            <h3>ฝาก K-TOKEN</h3>
            <p style="font-size: 0.8rem; color: #888; margin: 10px 0;">โอน K-Token ไปยัง:</p>
            <div class="address-box">0x242cb010f78cc714cbe8f3e344f24d87486eb268</div>
            <input type="number" id="dep-amount" placeholder="จำนวน K" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <input type="text" id="dep-tx" placeholder="Transaction Hash" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff;">
            <button class="btn-action" style="background:var(--accent); color:#000;" onclick="submitDeposit()">แจ้งยืนยันการโอน</button>
        </div>
    </div>

    <div class="container" id="game-ui">
        <div class="price-ticker" id="ticker-box">
            K-TOKEN: <span id="price-val">$0.000000</span> 
            (<span id="price-chg">0%</span>)
        </div>

        <div class="main-layout">
            <div class="panel">
                <div class="wallet-card">
                    <p style="font-size: 0.7rem; color: #888;">MY BALANCE</p>
                    <h2 id="k-balance" style="color: var(--accent);">0.00 K</h2>
                    <div style="display: flex; gap: 5px; margin-top: 10px;">
                        <button onclick="openDeposit()" style="flex:1; cursor:pointer; padding:5px; border-radius:5px;">DEPOSIT</button>
                        <button onclick="withdraw()" style="flex:1; cursor:pointer; padding:5px; border-radius:5px;">WITHDRAW</button>
                    </div>
                </div>
                <h3>GUARDIAN <span id="admin-tag" style="background:var(--admin-color); color:#000; font-size:0.6rem; padding:2px 5px; border-radius:4px;" class="hidden">ADMIN</span></h3>
                <div class="bird-display" style="text-align: center;">
                    <div class="bird-emoji">🐦</div>
                    <h2 id="bird-lvl">LVL: 1</h2>
                </div>
                <div class="hp-bar-bg" style="background:#333; height:10px; border-radius:5px; overflow:hidden; margin:10px 0;">
                    <div id="hp-fill" style="background:var(--accent); height:100%; width:100%; transition: 0.3s;"></div>
                </div>
                <p id="hp-text" style="font-size: 0.8rem; text-align:center;">HP: 100/100</p>
                <button class="btn-action btn-upgrade" onclick="upgrade()">UPGRADE (50 Energy)</button>
            </div>

            <div class="panel" style="text-align: center; display: flex; flex-direction: column; justify-content: center;">
                <h1 style="color: var(--accent); font-size: 5rem; text-shadow: 0 0 20px var(--accent);" id="energy-val">0.00</h1>
                <p style="color: #666; font-weight: bold; letter-spacing: 5px; margin-bottom: 2rem;">K-ENERGY</p>
                <button class="btn-action btn-harvest" onclick="harvest()">HARVEST ENERGY</button>
                <button class="btn-action" style="background:#4d94ff; color:#fff" onclick="heal()">HEAL HP (10 Energy)</button>
                <button class="btn-action btn-claim hidden" id="claim-btn" style="background:#ff00ff; color:#fff" onclick="claimDaily()">🎁 CLAIM DAILY REWARD</button>
            </div>

            <div class="panel">
                <div id="admin-section" class="hidden">
                    <h3 style="color: var(--admin-color); border-bottom: 1px solid var(--admin-color); padding-bottom: 5px; margin-bottom: 10px;">PENDING REQUESTS</h3>
                    <div class="log-box" id="admin-requests" style="height: 250px; background: rgba(255, 159, 67, 0.05);">
                        <p style="color:#555; text-align:center;">No pending requests</p>
                    </div>
                </div>
                <div id="user-section">
                    <h3>WORLD LOG</h3>
                    <div class="log-box" id="game-log"></div>
                    <h3 style="margin-top: 1rem;">HISTORY</h3>
                    <div class="log-box" id="user-history" style="height: 150px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_ADDR = "0x242cb010f78cc714cbe8f3e344f24d87486eb268";
        const K_TOKEN_ADDR = "0x465C4eACE8eF06A4308db2e6CcE5D6f99BbB21dc";
        
        let player = { addr: "", pass: "", energy: 0, hp: 100, lvl: 1, pwr: 10, def: 5, kBalance: 0, lastClaim: 0, history: [] };
        let market = { change: 0, state: "neutral" };
        
        function login() {
            const addrInput = document.getElementById('addr').value.trim().toLowerCase();
            const passInput = document.getElementById('pass').value.trim();
            if(addrInput.length < 10) return alert("Please enter valid Address");

            const saved = localStorage.getItem('kiwi_p3_db_' + addrInput);
            if(saved) {
                const data = JSON.parse(saved);
                if(data.pass !== passInput) return alert("Wrong Password!");
                player = data;
            } else {
                player.addr = addrInput;
                player.pass = passInput;
                save();
            }

            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('game-ui').style.display = 'block';
            
            if(player.addr === ADMIN_ADDR) {
                document.getElementById('admin-section').classList.remove('hidden');
                document.getElementById('admin-tag').classList.remove('hidden');
            }

            updateUI();
            startPriceOracle();
            setInterval(gameTick, 5000);
            renderAdminPanel();
        }

        async function startPriceOracle() {
            const fetchPrice = async () => {
                try {
                    const res = await fetch(`https://api.dexscreener.com/latest/dex/tokens/${K_TOKEN_ADDR}`);
                    const data = await res.json();
                    if(data.pairs && data.pairs.length > 0) {
                        const pair = data.pairs[0];
                        const price = parseFloat(pair.priceUsd);
                        const change = parseFloat(pair.priceChange.h24); // Check 24h change
                        
                        document.getElementById('price-val').innerText = `$${price.toFixed(6)}`;
                        document.getElementById('price-chg').innerText = (change >= 0 ? '+' : '') + change + "%";
                        document.getElementById('price-chg').style.color = change >= 0 ? "#00ff88" : "#ff4d4d";

                        market.state = change > 1 ? "bullish" : (change < -1 ? "bearish" : "neutral");
                        document.body.className = market.state;
                    }
                } catch(e) { console.log("Oracle fetch error"); }
            };
            fetchPrice(); 
            setInterval(fetchPrice, 10000); // Update every 10 sec
        }

        function gameTick() {
            const freshData = localStorage.getItem('kiwi_p3_db_' + player.addr);
            if(freshData) {
                const parsed = JSON.parse(freshData);
                player.kBalance = parsed.kBalance;
                player.history = parsed.history;
            }
            if(market.state === "bearish") {
                player.hp = Math.max(0, player.hp - 1);
                if(player.hp <= 0) { player.hp = 50; if(player.lvl > 1) player.lvl--; }
            }
            checkDaily();
            updateUI();
            save();
            if(player.addr === ADMIN_ADDR) renderAdminPanel();
        }

        function openDeposit() { document.getElementById('deposit-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('deposit-modal').classList.add('hidden'); }
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("Copied to clipboard!");
        }

        function submitDeposit() {
            const amt = document.getElementById('dep-amount').value;
            const tx = document.getElementById('dep-tx').value;
            if(!amt || !tx) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            const req = { 
                id: Date.now(), 
                addr: player.addr, 
                type: 'DEPOSIT', 
                amount: parseFloat(amt), 
                tx: tx, 
                status: 'PENDING', 
                date: new Date().toLocaleDateString() 
            };
            
            player.history.unshift(req);
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            queue.push(req);
            localStorage.setItem('admin_queue', JSON.stringify(queue));

            addLog("ส่งคำขอฝากเหรียญเรียบร้อย...");
            closeModal();
            save();
            updateUI();
        }

        function withdraw() {
            const amt = prompt("ใส่จำนวน K ที่ต้องการถอน (ระบบจะหักยอดทันที):");
            const val = parseFloat(amt);
            if(val && val > 0 && val <= player.kBalance) {
                player.kBalance -= val;
                const req = { 
                    id: Date.now(), 
                    addr: player.addr, 
                    type: 'WITHDRAW', 
                    amount: val, 
                    status: 'PENDING', 
                    date: new Date().toLocaleDateString() 
                };
                player.history.unshift(req);
                let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
                queue.push(req);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                save();
                updateUI();
                alert("คำขอถอนถูกส่งแล้ว กรุณารอแอดมินยืนยัน Tx");
            } else alert("ยอดไม่เพียงพอ");
        }

        // --- Admin Controls ---
        function renderAdminPanel() {
            if(player.addr !== ADMIN_ADDR) return;
            const adminBox = document.getElementById('admin-requests');
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            
            if(queue.length === 0) {
                adminBox.innerHTML = '<p style="color:#555; text-align:center; padding-top:20px;">No pending requests</p>';
                return;
            }

            adminBox.innerHTML = queue.map(req => `
                <div class="req-card">
                    <b style="color:var(--admin-color)">[${req.type}]</b> Amt: <b>${req.amount} K</b><br>
                    <div class="address-box">
                        User: ${req.addr}
                        <button class="copy-btn" onclick="copyToClipboard('${req.addr}')">COPY</button>
                    </div>
                    ${req.tx ? `<div style="font-size:0.65rem; color:#888;">Tx: ${req.tx} <button class="copy-btn" onclick="copyToClipboard('${req.tx}')">COPY</button></div>` : ''}
                    <div style="display:flex; gap:10px;">
                        ${req.type === 'DEPOSIT' ? 
                            `<button class="req-btn" onclick="approveDeposit(${req.id}, '${req.addr}')">APPROVE</button>` :
                            `<button class="req-btn" style="background:#4d94ff" onclick="approveWithdraw(${req.id}, '${req.addr}')">CONFIRM TX</button>`
                        }
                        <button class="req-btn" style="background:var(--danger)" onclick="rejectReq(${req.id}, '${req.addr}')">REJECT</button>
                    </div>
                </div>
            `).join('');
        }

        function approveDeposit(reqId, userAddr) {
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            if(reqIdx === -1) return;

            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            
            if(userData) {
                userData.kBalance += queue[reqIdx].amount;
                userData.history.forEach(h => { if(h.id === reqId) h.status = 'SUCCESS'; });
                localStorage.setItem(userKey, JSON.stringify(userData));
                queue.splice(reqIdx, 1);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                alert("Confirmed & Added Balance!");
                renderAdminPanel();
            }
        }

        function approveWithdraw(reqId, userAddr) {
            const tx = prompt("กรุณาวาง Transaction Hash เพื่อยืนยันการโอน:");
            if(!tx) return;

            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            
            if(userData) {
                userData.history.forEach(h => { if(h.id === reqId) { h.status = 'SUCCESS'; h.tx = tx; } });
                localStorage.setItem(userKey, JSON.stringify(userData));
                queue.splice(reqIdx, 1);
                localStorage.setItem('admin_queue', JSON.stringify(queue));
                alert("Withdrawal Finalized!");
                renderAdminPanel();
            }
        }

        function rejectReq(reqId, userAddr) {
            if(!confirm("ต้องการปฏิเสธรายการนี้?")) return;
            let queue = JSON.parse(localStorage.getItem('admin_queue') || '[]');
            const reqIdx = queue.findIndex(r => r.id === reqId);
            const req = queue[reqIdx];
            const userKey = 'kiwi_p3_db_' + userAddr;
            let userData = JSON.parse(localStorage.getItem(userKey));
            if(userData) {
                if(req.type === 'WITHDRAW') userData.kBalance += req.amount;
                userData.history.forEach(h => { if(h.id === reqId) h.status = 'REJECTED'; });
                localStorage.setItem(userKey, JSON.stringify(userData));
            }
            queue.splice(reqIdx, 1);
            localStorage.setItem('admin_queue', JSON.stringify(queue));
            renderAdminPanel();
        }

        // --- Standard Logic ---
        function harvest() {
            let gain = market.state === "bullish" ? 2 : 1;
            player.energy += gain;
            updateUI();
        }

        function heal() {
            if(player.energy >= 10 && player.hp < 100) {
                player.energy -= 10; player.hp = Math.min(100, player.hp + 20);
                addLog("Healed +20 HP"); updateUI(); save();
            }
        }

        function upgrade() {
            let cost = 50 * player.lvl;
            if(player.energy >= cost) {
                player.energy -= cost; player.lvl++;
                addLog("Evolved to Level " + player.lvl);
                updateUI(); save();
            }
        }

        function checkDaily() {
            const btn = document.getElementById('claim-btn');
            if(Date.now() - player.lastClaim > 86400000 && player.lvl >= 5) btn.classList.remove('hidden');
            else btn.classList.add('hidden');
        }

        function claimDaily() {
            let r = player.lvl >= 10 ? 100 : 50;
            player.kBalance += r; player.lastClaim = Date.now();
            addLog(`Daily Reward +${r} K`); updateUI(); save();
        }

        function addLog(m) {
            const box = document.getElementById('game-log');
            box.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${m}</div>` + box.innerHTML;
        }

        function updateUI() {
            document.getElementById('energy-val').innerText = player.energy.toFixed(2);
            document.getElementById('k-balance').innerText = player.kBalance.toFixed(2) + " K";
            document.getElementById('bird-lvl').innerText = "LVL: " + player.lvl;
            document.getElementById('hp-fill').style.width = player.hp + "%";
            document.getElementById('hp-text').innerText = `HP: ${Math.floor(player.hp)}/100`;
            
            const histBox = document.getElementById('user-history');
            histBox.innerHTML = player.history.slice(0, 10).map(h => `
                <div style="border-bottom:1px solid #222; padding:5px; font-size:0.7rem;">
                    <b>${h.type}</b>: ${h.amount} K <br>
                    Status: <span style="color:${h.status === 'SUCCESS' ? 'var(--accent)' : (h.status === 'REJECTED' ? 'var(--danger)' : '#ff9f43')}">${h.status}</span>
                </div>
            `).join('');
        }

        function save() { localStorage.setItem('kiwi_p3_db_' + player.addr, JSON.stringify(player)); }
    </script>
</body>
</html>
